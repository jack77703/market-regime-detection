name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-check:
    name: Lint & Import Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names; ignore line-length warnings
          flake8 market_regime/ main.py \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

      - name: Verify all modules import cleanly
        run: |
          python -c "
          from market_regime import config
          from market_regime.data_loader import load_spy_data
          from market_regime.features import build_features, FEATURE_COLS
          from market_regime.model import fit_regimes
          from market_regime.analysis import regime_summary, evaluate_n_regimes, optimal_n_regimes
          from market_regime.visualization import plot_regimes, plot_aic_bic, plot_backtest
          from market_regime.backtest import run_backtest, performance_metrics
          print('All imports OK')
          "
